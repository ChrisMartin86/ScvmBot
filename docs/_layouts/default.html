<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --text: #e0e0e0;
      --text-muted: #999;
      --accent: #c9a84c;
      --border: #333;
      --link: #c9a84c;
      --link-hover: #e0c068;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 1.2rem 2rem;
    }

    header .inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active {
      color: var(--accent);
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      width: 100%;
      flex: 1;
    }

    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }

    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent); }
    h2 { font-size: 1.3rem; margin-top: 2rem; margin-bottom: 0.5rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.4rem; }

    p { margin-bottom: 1rem; }
    ul, ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    li { margin-bottom: 0.3rem; }

    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    em { color: var(--text-muted); }

    code {
      background: var(--surface);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
    }

    pre {
      background: var(--surface);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    pre code {
      padding: 0;
      background: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }

    th, td {
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--border);
      text-align: left;
    }

    th {
      background: var(--surface);
    }

    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      color: var(--text-muted);
      background: var(--surface);
      border-radius: 0 4px 4px 0;
    }

    .page-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      header .inner { flex-direction: column; align-items: flex-start; }
      main { padding: 1.5rem 1rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <h1><a href="{{ site.baseurl }}/">ScvmBot</a></h1>
      <nav>
        <a href="{{ site.baseurl }}/terms-of-service">Terms</a>
        <a href="{{ site.baseurl }}/privacy">Privacy</a>
        <a href="{{ site.baseurl }}/license">License</a>
        <a href="{{ site.baseurl }}/security">Security</a>
        <a href="{{ site.baseurl }}/third-party-licenses">Third-Party</a>
      </nav>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <a href="https://github.com/ChrisMartin86/ScvmBot">GitHub</a> · <a href="mailto:chris@scvmbot.com">Contact</a>
  </footer>
</body>
</html>
