# Example docker-compose configuration.
# The Dockerfile produces a standard .NET app image — you can run it with
# any container orchestrator or deployment method that supports environment variables.
# This compose file is one convenient way to do it locally.

services:
  bot:
    build:
      context: .
      dockerfile: src/ScvmBot.Bot/Dockerfile
    image: scvmbot-bot:${IMAGE_TAG:-latest}
    container_name: scvmbot-bot
    restart: unless-stopped

    # Optional .env file at the repo root. Any variable defined here is injected
    # into the container. Omit the file entirely if you set variables another way.
    env_file:
      - path: ./.env
        required: false

    environment:
      # Entries here override anything from .env for the same key.
      - Discord__Token=${DISCORD_TOKEN}
      - Bot__SyncCommands=${BOT_SYNC_COMMANDS:-false}
      - Logging__LogLevel__Default=${LOG_LEVEL_DEFAULT:-Information}
      - Logging__LogLevel__Microsoft=${LOG_LEVEL_MICROSOFT:-Warning}
      - Logging__LogLevel__Discord=${LOG_LEVEL_DISCORD:-Information}

    networks:
      - scvmbot-network

networks:
  scvmbot-network:
    driver: bridge
